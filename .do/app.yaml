name: employee-payroll

services:
  - name: payroll-backend
    github:
      repo: SanthoshkumarSelvakumar/employee-management
      branch: main
      deploy_on_push: true
    source_dir: /payroll-backend
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${dev-db-676603.DATABASE_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_STRONG_SECRET
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: ${APP_URL}

static_sites:
  - name: payroll-frontend
    github:
      repo: SanthoshkumarSelvakumar/employee-management
      branch: main
      deploy_on_push: true
    source_dir: /payroll-frontend
    build_command: npm install && npm run build
    output_dir: dist
    catchall_document: index.html
    routes:
      - path: /
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: ${APP_URL}/api
