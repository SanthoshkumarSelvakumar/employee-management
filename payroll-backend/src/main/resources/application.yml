server:
  port: 8080

spring:
  datasource:
    url: jdbc:${DATABASE_URL:postgresql://localhost:5432/payroll_db}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiBpbiBwcm9kdWN0aW9u}
    access-token-expiration-ms: 86400000
    refresh-token-expiration-ms: 604800000

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

logging:
  level:
    com.payroll: INFO
    org.springframework.security: INFO
