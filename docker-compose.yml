services:
  postgres:
    image: postgres:15-alpine
    container_name: payroll-db
    environment:
      POSTGRES_DB: payroll_db
      POSTGRES_USER: payroll_user
      POSTGRES_PASSWORD: payroll_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payroll_user -d payroll_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./payroll-backend
    container_name: payroll-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payroll_db
      DB_USERNAME: payroll_user
      DB_PASSWORD: payroll_pass
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiBpbiBwcm9kdWN0aW9u
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./payroll-frontend
    container_name: payroll-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
